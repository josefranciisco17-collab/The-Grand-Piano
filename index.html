
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Piano Deluxe Yamaha Premium</title>

<link rel="icon" type="image/png" sizes="512x512" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>

<style>

body{
margin:0;
padding:15px;
background:#121212;
color:#fff;
font-family:Segoe UI;
text-align:center;
overflow-x:hidden;
overflow-y:hidden;
touch-action:none;
overscroll-behavior:none;
min-height:100vh;
}

.controls{
position:fixed;
top:2px;
left:0;
width:100%;
display:grid;
grid-template-columns: auto auto auto;
grid-template-rows: auto auto;
justify-content:start;
gap:8px;
align-items:center;
padding:8px 10px;
box-sizing:border-box;
background:#121212;
z-index:999;
}

#logoBox{
position:fixed;
top:28px;
right:20px;
text-align:right;
z-index:1000;
display:flex;
flex-direction:column;
align-items:flex-end;
}

#middleLogo{
position:fixed;
top:-35px;
left:50%;
transform:translateX(-50%);
width:155px;
height:auto;
z-index:999;
filter:drop-shadow(0 0 10px rgba(255,215,0,.45));
}



#mainTitle{
font-family:"Georgia", serif;
font-size:16px;
font-weight:bold;
letter-spacing:1px;
margin:0;
line-height:1.1;
color:#fff;
text-shadow:0 0 8px rgba(255,255,255,.15);
}

#brandText{
font-family:"Times New Roman", serif;
font-size:8px;
letter-spacing:2px;
color:#c9c9c9;
margin-top:2px;
text-transform:uppercase;
}

h1{
font-size:28px;
margin:0;
white-space:nowrap;
}

p{
font-size:11px;
margin:0;
color:#bbb;
}

button,label{
padding:5px 8px;
border-radius:12px;
background:#1f1f1f;
color:#fff;
border:1px solid #444;
cursor:pointer;
font-weight:bold;
font-size:10px;
box-shadow:
inset 0 0 5px rgba(255,255,255,.08),
0 2px 6px rgba(0,0,0,.4);
}


button:active,label:active{
transform:scale(.96);
}

input[type=file]{
display:none;
}

.piano-container{
position:fixed;
bottom:0;
left:0;
width:100%;
max-width:100vw;
height:calc(100vh - 110px);
background:transparent;
padding:10px;
box-sizing:border-box;
overflow-x:auto;
overflow-y:hidden;
touch-action:pan-x;
scroll-behavior:auto;
}

.white{
min-width:55px;
width:55px;
height:280px;
background:#fff;
opacity:1;
}

.black{
min-width:35px;
width:35px;
height:170px;
margin-left:-17px;
margin-right:-17px;
z-index:2;
position:relative;
}

.piano-keyboard{
display:flex;
position:relative;
min-width:max-content;
width:fit-content;
flex-shrink:0;
padding-bottom:10px;
}

.key{
width:38px;
height:210px;
background:linear-gradient(#ffffff,#f0f0f0,#dcdcdc);
border-left:2px solid #000;
border-right:2px solid #000;
border-bottom:2px solid #000;
position:relative;
box-shadow:inset 0 0 8px rgba(255,255,255,.8);
box-sizing:border-box;
border-radius:0 0 8px 8px;
transition:.05s;

-webkit-user-select: none;
user-select: none;
-webkit-touch-callout: none;
-webkit-user-drag: none;
-webkit-tap-highlight-color: transparent;
touch-action: pan-x;
}

.key.active{
transform:translateY(2px);
background:#d0d0d0;
}

.key.left-hand{
background:
linear-gradient(
to bottom,
#7fd8ff 0%,
#4fc3ff 45%,
#dff8ff 100%
);

box-shadow:
0 0 18px rgba(0,180,255,.85),
0 0 35px rgba(0,180,255,.55),
0 0 55px rgba(0,180,255,.25);

border-left:2px solid #3bbcff;
border-right:2px solid #3bbcff;
}

.key.right-hand{
background:
linear-gradient(
to bottom,
#ffe98a 0%,
#ffd54f 45%,
#fff8d0 100%
);

box-shadow:
0 0 18px rgba(255,215,80,.85),
0 0 35px rgba(255,215,80,.55),
0 0 55px rgba(255,215,80,.25);

border-left:2px solid #ffcf33;
border-right:2px solid #ffcf33;
}

.black{
position:absolute;
width:24px;
height:130px;
background:linear-gradient(to right,#1f1f1f,#000,#111);
z-index:2;
margin-left:-12px;
border:1px solid #000;
box-shadow:inset 0 0 4px rgba(255,255,255,0.2);
border-radius:0 0 6px 6px;
}

.black.left-hand{
background:#0b4f70;
}

.black.right-hand{
background:#7a5a00;
}

.label{
position:absolute;
bottom:5px;
left:50%;
transform:translateX(-50%);
font-size:8px;
pointer-events:none;
color:#eee;
}

@media(max-width:700px){
body{
padding:10px;
}
h2{
font-size:38px;
margin-bottom:10px;
}
.key{
width:32px;
height:180px;
}
.black{
width:20px;
height:105px;
margin-left:-10px;
}
button,label{
font-size:11px;
padding:8px 12px;
}
}
</style>
</head>

<body>

<div class="controls" id="controlsBox">
<button id="pedal">Sustain OFF</button>
<button id="menuBtn">🏠 Ir al Menú</button>
<label for="midiFile">Seleccionar MIDI</label>

<button id="pauseMidi">⏸ Pausar</button>
<button id="continueMidi">⏭ Continuar</button>
<button id="playMidi">▶ Reproducir</button>

<input type="file" id="midiFile" accept=".mid,.midi">
</div>

<img src="./icon.png" id="middleLogo">

<div id="logoBox">
  <h2 id="mainTitle">Piano Deluxe Premium</h2>
  <div id="brandText">JFAM & Co. Piano Studios</div>
</div>

<div class="piano-container" id="container">
  <div class="piano-keyboard" id="keyboard"></div>
</div>
<script>

const AudioContextClass=
window.AudioContext||
window.webkitAudioContext;

let audioCtx;
let sustain=false;
let locked=false;
const cache={};
let midiData=null;
let midiTimeouts=[];
let paused=false;
let pauseTime=0;
let startTime=0;

const mainTitle=document.getElementById("mainTitle");
const brandText=document.getElementById("brandText");
const controlsBox=document.getElementById("controlsBox");

function hideUI(){
    mainTitle.style.visibility="hidden";
    brandText.style.visibility="hidden";
    controlsBox.style.visibility="hidden";
}

function showUI(){
    mainTitle.style.visibility="visible";
    brandText.style.visibility="visible";
    controlsBox.style.visibility="visible";
}

function clearAllLights(){
document.querySelectorAll(".key")
.forEach(key=>{
key.classList.remove(
"left-hand",
"right-hand"
);
});
}

function initAudio(){
if(!audioCtx)
audioCtx=new AudioContextClass();
}

document.getElementById("pedal").onclick=()=>{
sustain=!sustain;
document.getElementById("pedal").textContent=
"Sustain "+(sustain?"ON":"OFF");
};


document.getElementById("menuBtn").onclick=()=>{
location.href="menu.html";
};

const SAMPLE_NOTES=[
"A0","C1","Ds1","Fs1","A1","C2","Ds2","Fs2","A2",
"C3","Ds3","Fs3","A3","C4","Ds4","Fs4","A4",
"C5","Ds5","Fs5","A5","C6","Ds6","Fs6","A6",
"C7","Ds7","Fs7","A7","C8"
];

function noteToMidi(name){
const map={
C:0,Cs:1,D:2,Ds:3,E:4,
F:5,Fs:6,G:7,Gs:8,A:9,
As:10,B:11
};

const m=name.match(/^([A-G]s?)(\d)$/);

return (parseInt(m[2])+1)*12+map[m[1]];
}

function getBestSample(noteId){
const midi=noteId+21;
let best=SAMPLE_NOTES[0], diff=999;

for(const s of SAMPLE_NOTES){
const d=Math.abs(midi-noteToMidi(s));
if(d<diff){
diff=d;
best=s;
}
}

const semitones=
midi-noteToMidi(best);

return{
file:`audio/${best}v8.mp3`,
rate:Math.pow(2,semitones/12)
};
}

async function loadSample(file){
if(cache[file]) return cache[file];

const r=await fetch(file);
const b=await r.arrayBuffer();
const a=await audioCtx.decodeAudioData(b);

cache[file]=a;
return a;
}

async function playNote(noteId){
initAudio();

const s=getBestSample(noteId);
const buffer=await loadSample(s.file);

const src=audioCtx.createBufferSource();
src.buffer=buffer;
src.playbackRate.value=s.rate;

const gain=audioCtx.createGain();
gain.gain.value=1.0;

src.connect(gain);
gain.connect(audioCtx.destination);

src.start();

if(!sustain){
gain.gain.exponentialRampToValueAtTime(
0.001,
audioCtx.currentTime+1.5
);
src.stop(audioCtx.currentTime+1.6);
}
}

const names=[
"Do","Do#","Re","Re#",
"Mi","Fa","Fa#","Sol",
"Sol#","La","La#","Si"
];

const keyboard=document.getElementById("keyboard");
let white=0;

for(let i=0;i<88;i++){

const note=(i+9)%12;
const oct=Math.floor((i+9)/12);
const black=names[note].includes("#");

const key=document.createElement("div");
key.className="key"+(black?" black":"");
key.dataset.note=i;

const label=document.createElement("span");
label.className="label";
label.textContent=names[note]+oct;

key.appendChild(label);

if(black){
key.style.left=(white*38)+"px";
}else{
white++;
}

key.addEventListener("touchstart", async (e) => {
e.stopPropagation();
key.classList.add("active");
playNote(i);

setTimeout(()=>{
key.classList.remove("active");
},120);
});

keyboard.appendChild(key);
}

document.getElementById("midiFile")
.addEventListener("change",async(e)=>{

const file=e.target.files[0];
if(!file)return;

const buffer=await file.arrayBuffer();
midiData=new Midi(buffer);

alert("MIDI cargado");

});

function clearMidi(){
midiTimeouts.forEach(
t=>clearTimeout(t)
);

midiTimeouts=[];
showUI();
}

function scheduleMidi(offset=0){

if(!midiData)return;

startTime=Date.now()-offset*1000;

midiData.tracks.forEach(track=>{

track.notes.forEach(n=>{

if(n.time<offset)return;

const noteId=n.midi-21;

const timeout=setTimeout(()=>{

const key=document.querySelector(
'[data-note="'+noteId+'"]'
);

if(key){

key.classList.add("active");

if(noteId<39){
key.classList.add("left-hand");
}else{
key.classList.add("right-hand");
}

playNote(noteId);

setTimeout(()=>{

key.classList.remove(
"active",
"left-hand",
"right-hand"
);

if(n===track.notes[
track.notes.length-1
]){
clearAllLights();
showUI();
}

},n.duration*1000);

}

},(n.time-offset)*1000);

midiTimeouts.push(timeout);

});

});

}

document.getElementById("playMidi").onclick=()=>{

if(!midiData){
alert("Selecciona un MIDI");
return;
}

clearMidi();
pauseTime=0;
scheduleMidi(0);
paused=false;

};

document.getElementById("pauseMidi").onclick=()=>{

clearMidi();
clearAllLights();

pauseTime=
(Date.now()-startTime)/1000;

paused=true;

};

document.getElementById("continueMidi").onclick=()=>{

if(!paused)return;

clearMidi();
scheduleMidi(pauseTime);
paused=false;

};

</script>

</body>
</html>
